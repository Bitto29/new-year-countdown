<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Year Countdown</title>
    <link rel="icon" href="b logo (2).PNG">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 8px;
            background-color: #1f1f1f;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .countdown {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .countdown-item {
            margin: 0 10px;
        }

        .countdown-value {
            font-size: 36px;
            font-weight: bold;
        }

        .countdown-label {
            font-size: 18px;
        }

        .new-year-wishes {
            display: none;
        }

        .fireworks-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Countdown to New Year 2026!</h1>
        <div class="countdown">
            <div class="countdown-item days">
                <span class="countdown-value">00</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item hours">
                <span class="countdown-value">00</span>
                <span class="countdown-label">Hours</span>
            </div>
            <div class="countdown-item minutes">
                <span class="countdown-value">00</span>
                <span class="countdown-label">Minutes</span>
            </div>
            <div class="countdown-item seconds">
                <span class="countdown-value">00</span>
                <span class="countdown-label">Seconds</span>
            </div>
        </div>
        <div class="new-year-wishes">
            <h1>Happy New Year 2026!</h1>
            <p>Wishing you a year full of joy, prosperity, and success!</p>
        </div>
    </div>

    <div class="fireworks-container">
        <canvas id="fireworks"></canvas>
    </div>

    <script src="https://bitto29.github.io/new-year-countdown/script.js">

    </script>
</body>
</html>
